<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pageTitle}">Work Hours</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<header class="top-bar">
    <div class="brand-heading">
        <img th:src="@{/images/nh-hygiene-logo.png}" alt="NH Hygiene Services Ltd." class="brand-logo">
        <div>
            <p class="eyebrow">Time Tracking</p>
            <h1 th:text="${pageTitle}">Work Hours</h1>
        </div>
    </div>
    <a th:href="@{/work-hours}" class="secondary-button">Back</a>
</header>

<main class="page narrow-page">
    <form th:object="${workHourForm}"
          th:action="${workHourForm.id == null} ? @{/work-hours} : @{/work-hours/{id}(id=${workHourForm.id})}"
          method="post"
          class="form-panel">

        <label>
            Employee
            <select th:field="*{employeeId}" required>
                <option value="">Select employee</option>
                <option th:each="employee : ${employees}" th:value="${employee.id}" th:text="${employee.fullName}"></option>
            </select>
            <span class="field-error" th:errors="*{employeeId}"></span>
        </label>

        <label>
            Site Location
            <select th:field="*{workSiteId}" required>
                <option value="">Select site location</option>
                <optgroup th:each="customer : ${customers}" th:label="${customer.name}">
                    <option th:each="site : ${customer.workSites}"
                            th:value="${site.id}"
                            th:text="${site.location}">
                        Site
                    </option>
                </optgroup>
            </select>
            <span class="field-error" th:errors="*{workSiteId}"></span>
        </label>

        <label>
            Work Date
            <input type="date" th:field="*{workDate}" required>
            <span class="field-error" th:errors="*{workDate}"></span>
        </label>

        <div class="form-grid">
            <label>
                Regular Hours
                <input type="number" th:field="*{regularHours}" min="0" max="24" step="0.25" required>
                <span class="field-error" th:errors="*{regularHours}"></span>
            </label>

            <label>
                Overtime Hours
                <input type="number" th:field="*{overtimeHours}" min="0" max="24" step="0.25" required>
                <span class="field-error" th:errors="*{overtimeHours}"></span>
            </label>
        </div>

        <label>
            Notes
            <textarea th:field="*{notes}" rows="4"></textarea>
            <span class="field-error" th:errors="*{notes}"></span>
        </label>

        <div class="form-actions">
            <button type="submit" class="primary-button">Save Work Hours</button>
            <a th:href="@{/work-hours}" class="secondary-button">Cancel</a>
        </div>
    </form>
</main>
</body>
</html>
