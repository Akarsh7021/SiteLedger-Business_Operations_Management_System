<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${contractor.name}">Customer</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<header class="top-bar">
    <div class="brand-heading">
        <img th:src="@{/images/nh-hygiene-logo.png}" alt="NH Hygiene Services Ltd." class="brand-logo">
        <div>
            <p class="eyebrow">Customer Info</p>
            <h1 th:text="${contractor.name}">Customer</h1>
        </div>
    </div>
    <nav class="top-nav" aria-label="Primary">
        <a th:href="@{/customers}" class="secondary-button">Back</a>
        <a th:href="@{/customers/{id}/edit(id=${contractor.id})}" class="primary-button">Edit Info</a>
    </nav>
</header>

<main class="page">
    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

    <section class="detail-grid">
        <div class="info-box">
            <span>Name</span>
            <strong th:text="${contractor.name}">Name</strong>
        </div>
        <div class="info-box">
            <span>Number</span>
            <strong th:text="${contractor.phoneNumber ?: '-'}">Phone</strong>
        </div>
        <div class="info-box">
            <span>Builder / Owner</span>
            <strong th:text="${contractor.customerType}">OWNER</strong>
        </div>
        <div class="info-box">
            <span>Billing Name</span>
            <strong th:text="${contractor.billingName ?: '-'}">Billing</strong>
        </div>
        <div class="info-box">
            <span>Address</span>
            <strong th:text="${contractor.address ?: '-'}">Address</strong>
        </div>
        <div class="info-box">
            <span>Money Paid To Date</span>
            <strong th:text="${#numbers.formatCurrency(contractor.amountPaidToDate)}">$0.00</strong>
        </div>
        <div class="info-box">
            <span>Amount Owed</span>
            <strong class="amount-unpaid" th:text="${#numbers.formatCurrency(contractor.amountUnpaid)}">$0.00</strong>
        </div>
        <div class="info-box detail-notes">
            <span>Notes</span>
            <strong th:text="${contractor.notes ?: '-'}">Notes</strong>
        </div>
    </section>

    <section class="detail-section">
        <div class="section-heading">
            <h2>Work Sites</h2>
            <button type="button" class="primary-button" data-modal-target="work-site-modal">Add Work Site</button>
        </div>

        <div class="site-card-grid" th:if="${!#lists.isEmpty(contractor.workSites)}">
            <div class="site-card" th:each="site : ${contractor.workSites}">
                <strong th:text="${site.location}">Location</strong>
                <span th:text="${site.squareArea} + ' sq ft'">0 sq ft</span>
                <span th:text="'Quoted ' + ${#numbers.formatCurrency(site.quotedAmount)}">Quoted $0.00</span>
                <span th:text="'GST ' + ${#numbers.formatCurrency(site.gstAmount)}">GST $0.00</span>
            </div>
        </div>
        <p th:if="${#lists.isEmpty(contractor.workSites)}" class="empty-state">No work sites added.</p>
    </section>

    <div id="work-site-modal" class="modal-backdrop" hidden>
        <section class="modal-panel wide-modal" role="dialog" aria-modal="true" aria-labelledby="work-site-title">
            <div class="modal-header">
                <div>
                    <p class="eyebrow" th:text="${contractor.name}">Customer</p>
                    <h2 id="work-site-title">Add Work Site</h2>
                </div>
                <button type="button" class="secondary-button modal-close">Close</button>
            </div>

            <form th:action="@{/customers/{contractorId}/work-sites(contractorId=${contractor.id})}" method="post" class="form-stack quote-form">
                <label>
                    Work Site Location
                    <input type="text" name="location" class="location-search" placeholder="Start typing an address or site name" autocomplete="off" required>
                    <div class="location-results"></div>
                </label>

                <div class="form-grid quote-grid">
                    <label>
                        Square Feet (SFT)
                        <input type="number" name="squareArea" class="quote-sft" min="0" step="0.01" required>
                    </label>
                    <label>
                        Unit Of Measurement
                        <select name="unitOfMeasurement" class="quote-uom" required>
                            <option th:each="unit : ${unitsOfMeasurement}" th:value="${unit}" th:text="${unit}"></option>
                        </select>
                    </label>
                    <label>
                        Cost
                        <input type="number" name="quotedAmount" class="quote-cost" min="0" step="0.01" required>
                    </label>
                </div>

                <label>
                    GST 5%
                    <input type="number" class="quote-gst" readonly>
                </label>

                <button type="submit" class="primary-button">Save Work Site</button>
            </form>
        </section>
    </div>
</main>
<script src="/js/app.js"></script>
</body>
</html>
