spring.application.name=Employee Tracking and Payment Management

# Bind to this computer only. This prevents other devices on the network from accessing the app.
server.address=127.0.0.1
server.port=8080

# Local SQLite database file. SQLite creates this file when the app first starts.
spring.datasource.url=jdbc:sqlite:employee-payroll.db
spring.datasource.driver-class-name=org.sqlite.JDBC

spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# Phase 1 admin account. Change these before using real employee data.
app.security.admin-username=admin
app.security.admin-password=change-me-now

server.servlet.session.timeout=30m
